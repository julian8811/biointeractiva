<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- DNA Helix - Left strand -->
  <path d="M35 20 Q25 35 35 50 Q45 65 35 80 Q25 95 35 110" 
        stroke="url(#grad1)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- DNA Helix - Right strand -->
  <path d="M85 20 Q95 35 85 50 Q75 65 85 80 Q95 95 85 110" 
        stroke="url(#grad1)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Connecting lines (base pairs) -->
  <line x1="38" y1="30" x2="82" y2="30" stroke="#94a3b8" stroke-width="2"/>
  <line x1="32" y1="50" x2="88" y2="50" stroke="#94a3b8" stroke-width="2"/>
  <line x1="38" y1="70" x2="82" y2="70" stroke="#94a3b8" stroke-width="2"/>
  <line x1="32" y1="90" x2="88" y2="90" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Binary sequences -->
  <text x="45" y="35" font-family="monospace" font-size="8" fill="#22d3ee">AT</text>
  <text x="68" y="55" font-family="monospace" font-size="8" fill="#818cf8">GC</text>
  <text x="45" y="75" font-family="monospace" font-size="8" fill="#22d3ee">TA</text>
  <text x="68" y="95" font-family="monospace" font-size="8" fill="#818cf8">CG</text>
</svg>
